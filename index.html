<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VESTA DrawCheck — Enterprise AI Inspector</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --navy: #203E5D; --burg: #6B2B41; --surface: #f8f9fa; }
        body { font-family: 'Jost', sans-serif; background-color: var(--surface); color: #1a2530; height: 100vh; overflow: hidden; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .bg-vesta-navy { background-color: var(--navy); }
        .bg-vesta-burg { background-color: var(--burg); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        #pdf-render-canvas { max-width: 100%; max-height: 70vh; object-fit: contain; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .tab-active { border-bottom: 2px solid var(--burg); color: var(--navy); font-weight: 600; }
        .page-thumb { cursor: pointer; border: 2px solid transparent; transition: all 0.2s; background: white; flex-shrink: 0; position: relative; }
        .page-thumb.active { border-color: var(--burg); transform: scale(1.05); z-index: 10; }
        .audited-dot { position: absolute; top: -4px; right: -4px; width: 10px; height: 10px; background: #10b981; border-radius: 50%; border: 2px solid white; display: none; }
        .page-thumb.has-audit .audited-dot { display: block; }
        .btn-primary { background-color: var(--navy); color: white; transition: all 0.2s; }
        .btn-primary:hover { background-color: #2a5070; transform: translateY(-1px); }
        .btn-secondary { background-color: var(--burg); color: white; transition: all 0.2s; }
        .btn-secondary:hover { background-color: #4e1f30; transform: translateY(-1px); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-vesta-navy h-20 flex items-center justify-between px-8 shrink-0 z-50 shadow-lg border-b border-white/5">
        <div class="flex items-center gap-6">
            <img src="VESTA_LOGO._White.Ver2.ai.png" alt="VESTA Logo" class="h-10 w-auto object-contain" onerror="this.src='https://placehold.co/200x80/203e5d/white?text=VESTA';">
            <div class="h-8 w-[1px] bg-white/20 ml-2 hidden sm:block"></div>
            <div class="hidden lg:block">
                <h2 class="text-white/80 font-medium text-xs tracking-[0.15em] uppercase">DrawCheck Production Suite</h2>
                <p class="text-[9px] text-white/40 tracking-widest uppercase font-light italic">Deductive Scoring Engine v2.5</p>
            </div>
        </div>
        <div id="file-meta" class="hidden text-white/60 text-[10px] uppercase tracking-widest bg-black/20 px-5 py-2.5 rounded-full border border-white/10">
            Set: <span id="doc-name" class="text-white font-bold">--</span> | <span id="page-count">0</span> Pages
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <div class="flex-1 flex flex-col border-r border-gray-200 bg-white overflow-hidden">
            <div id="page-nav" class="hidden h-24 border-b border-gray-100 bg-gray-50 flex items-center gap-4 px-6 overflow-x-auto shrink-0"></div>
            <div id="drop-zone" class="flex-1 m-8 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center p-12 transition-all hover:border-vesta-navy cursor-pointer">
                <div class="w-20 h-20 bg-vesta-navy rounded-2xl flex items-center justify-center shadow-2xl mb-8 text-white">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                </div>
                <h3 class="serif text-3xl font-semibold text-vesta-navy mb-3">Initialize Project Audit</h3>
                <button onclick="document.getElementById('file-input').click()" class="btn-primary px-10 py-4 rounded-xl text-sm font-bold tracking-widest uppercase">Browse Project Set</button>
                <input type="file" id="file-input" class="hidden" accept=".pdf,image/*" onchange="handleFile(event)">
            </div>
            <div id="canvas-area" class="hidden flex-1 relative bg-gray-100 flex items-center justify-center p-10 overflow-auto">
                <canvas id="pdf-render-canvas" class="shadow-2xl bg-white"></canvas>
                <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-4">
                    <button id="audit-btn" onclick="runAudit()" class="btn-secondary px-8 py-4 rounded-full shadow-2xl flex items-center gap-3 text-sm font-bold tracking-wider uppercase">Execute Analysis</button>
                </div>
            </div>
        </div>
        <div class="w-[440px] flex flex-col bg-slate-50 shadow-inner overflow-hidden">
            <div class="flex bg-white border-b border-gray-200 shrink-0">
                <button id="tab-findings" onclick="switchTab('findings')" class="flex-1 py-5 text-[10px] font-bold tracking-widest uppercase tab-active">Audit</button>
                <button id="tab-budget" onclick="switchTab('budget')" class="flex-1 py-5 text-[10px] font-bold tracking-widest uppercase text-gray-400">Takeoff</button>
                <button id="tab-batch" onclick="switchTab('batch')" class="flex-1 py-5 text-[10px] font-bold tracking-widest uppercase text-gray-400 flex items-center justify-center gap-1">Batch <span id="batch-badge" class="bg-vesta-navy text-white px-2 py-0.5 rounded-full text-[8px]">0</span></button>
            </div>
            <div id="empty-report" class="flex-1 flex flex-col items-center justify-center p-12 text-center opacity-40"><p class="text-sm">Select a page to begin.</p></div>
            <div id="loading-report" class="hidden flex-1 flex flex-col items-center justify-center p-12"><div class="w-12 h-12 border-[3px] border-t-vesta-burg rounded-full animate-spin"></div></div>
            <div id="report-container" class="hidden flex flex-col flex-1 overflow-hidden">
                <div id="findings-content" class="flex-1 overflow-y-auto p-5">
                    <div id="health-card" class="bg-white p-6 rounded-2xl border mb-5"><span id="health-score" class="serif text-5xl font-bold">--</span><div class="w-full h-2 bg-gray-100 rounded-full mt-2"><div id="health-bar" class="h-full bg-vesta-navy"></div></div><p id="verdict-text" class="text-xs italic mt-2"></p></div>
                    <div id="findings-list" class="space-y-3"></div>
                </div>
                <div id="budget-content" class="hidden flex-1 overflow-y-auto p-5"><div class="bg-vesta-navy p-6 rounded-2xl text-white mb-5"><span>Est. Page Value</span><div class="text-4xl font-bold">฿<span id="total-budget">0</span></div></div><tbody id="budget-table-body"></tbody></div>
                <div id="batch-content" class="hidden flex-1 overflow-y-auto p-5"><div id="batch-summary-list"></div></div>
                <div class="p-5 border-t bg-white flex gap-3"><button onclick="exportSummary()" class="flex-1 border py-3 rounded-xl text-[10px] font-bold uppercase">Export Page</button><button id="batch-export-btn" disabled onclick="exportBatchSummary()" class="flex-1 btn-primary py-3 rounded-xl text-[10px] font-bold uppercase">Export Batch</button></div>
            </div>
        </div>
    </main>

    <script>
        let pdfDoc = null, pageNum = 1, currentImageBase64 = null, renderTask = null, sessionAudits = {}; 
        const priceMaster = { "categories": { "Built-in Furniture": { "High-Cabinet (Kitchen/Wardrobe)": { "rate": 22000, "unit": "m" }, "Low-Cabinet (Base/TV Console)": { "rate": 15000, "unit": "m" } }, "Wall & Ceiling Finishes": { "Wallpaper (Premium)": { "rate": 850, "unit": "sqm" }, "Wall Paneling (Wood/MDF)": { "rate": 4500, "unit": "sqm" } }, "Flooring": { "SPC Flooring": { "rate": 1000, "unit": "sqm" }, "Engineered Wood": { "rate": 3500, "unit": "sqm" } }, "MEP & Lighting": { "Lighting Point": { "rate": 1800, "unit": "point" }, "Power Outlet": { "rate": 1500, "unit": "point" } } } };
        const flatPriceMap = {};
        Object.values(priceMaster.categories).forEach(cat => Object.keys(cat).forEach(item => flatPriceMap[item] = cat[item]));
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function handleFile(e) {
            const file = e.target.files[0]; if (!file) return;
            sessionAudits = {}; document.getElementById('drop-zone').classList.add('hidden');
            document.getElementById('doc-name').textContent = file.name;
            if (file.type === "application/pdf") {
                const ab = await file.arrayBuffer(); pdfDoc = await pdfjsLib.getDocument(ab).promise;
                document.getElementById('file-meta').classList.remove('hidden');
                document.getElementById('page-count').textContent = pdfDoc.numPages;
                document.getElementById('page-nav').classList.remove('hidden');
                renderThumbnails(); renderPage(1);
            }
        }

        async function renderThumbnails() {
            const nav = document.getElementById('page-nav'); nav.innerHTML = "";
            for (let i = 1; i <= Math.min(pdfDoc.numPages, 100); i++) {
                const btn = document.createElement('div');
                btn.className = `page-thumb h-16 w-12 border shadow-sm flex items-center justify-center text-[10px] font-bold rounded ${i===pageNum?'active':''}`;
                btn.innerHTML = `Page ${i}`;
                btn.onclick = () => { renderPage(i); }; nav.appendChild(btn);
            }
        }

        async function renderPage(num) {
            pageNum = num; const page = await pdfDoc.getPage(num);
            const vp = page.getViewport({ scale: 2.0 }); const cv = document.getElementById('pdf-render-canvas');
            cv.height = vp.height; cv.width = vp.width;
            await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
            currentImageBase64 = cv.toDataURL('image/jpeg', 0.8).split(',')[1];
            document.getElementById('canvas-area').classList.remove('hidden');
            if (sessionAudits[pageNum]) renderReport(sessionAudits[pageNum]);
        }

        async function runAudit() {
            if (!currentImageBase64) return;
            document.getElementById('loading-report').classList.remove('hidden');
            const prompt = `Senior Architect: Analyze this page. Categories: ${JSON.stringify(Object.keys(flatPriceMap))}. Return JSON { verdict, findings: [{severity, title, description}], takeoff: [{category, qty}] }`;

            try {
                // SECURITY UPDATE: Calling our local secure proxy instead of direct Google
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: currentImageBase64 } }] }],
                        generationConfig: { temperature: 0, responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                const aiResult = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // Deterministic Math
                let score = 100;
                aiResult.findings.forEach(f => {
                    if (f.severity === 'critical') score -= 15;
                    else if (f.severity === 'warning') score -= 5;
                });
                aiResult.healthScore = Math.max(0, score);
                
                sessionAudits[pageNum] = aiResult;
                renderReport(aiResult);
            } catch (err) { alert("Deployment Error: Make sure API key is set in Vercel."); }
            finally { document.getElementById('loading-report').classList.add('hidden'); }
        }

        function renderReport(data) {
            document.getElementById('report-container').classList.remove('hidden');
            document.getElementById('health-score').textContent = data.healthScore;
            const fList = document.getElementById('findings-list'); fList.innerHTML = "";
            data.findings.forEach(f => {
                const d = document.createElement('div'); d.className = "bg-white p-3 border-l-4 border-burg text-xs";
                d.innerHTML = `<b>${f.title}</b><p>${f.description}</p>`; fList.appendChild(d);
            });
        }
        function switchTab(t) { /* Simple tab toggle logic */ }
        function exportSummary() { /* Download .txt logic */ }
    </script>
</body>
</html>
