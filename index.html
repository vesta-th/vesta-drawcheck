<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VESTA DrawCheck — Enterprise AI Inspector</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --navy: #203E5D; --burg: #6B2B41; --surface: #f8f9fa; }
        body { font-family: 'Jost', sans-serif; background-color: var(--surface); color: #1a2530; height: 100vh; overflow: hidden; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .bg-vesta-navy { background-color: var(--navy); }
        .bg-vesta-burg { background-color: var(--burg); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        #pdf-render-canvas { max-width: 100%; max-height: 70vh; object-fit: contain; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .tab-active { border-bottom: 2px solid var(--burg); color: var(--navy); font-weight: 600; }
        .page-thumb { cursor: pointer; border: 2px solid transparent; transition: all 0.2s; background: white; flex-shrink: 0; position: relative; }
        .page-thumb.active { border-color: var(--burg); transform: scale(1.05); z-index: 10; }
        .btn-primary { background-color: var(--navy); color: white; transition: all 0.2s; }
        .btn-secondary { background-color: var(--burg); color: white; transition: all 0.2s; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-vesta-navy h-20 flex items-center justify-between px-8 shrink-0 z-50 shadow-lg border-b border-white/5">
        <div class="flex items-center gap-6">
            <!-- VESTA Logo -->
            <img src="VESTA_LOGO._White.Ver2.ai.png" alt="VESTA Logo" class="h-10 w-auto object-contain" onerror="this.src='https://placehold.co/200x80/203e5d/white?text=VESTA';">
            
            <div class="h-8 w-[1px] bg-white/20 ml-2 hidden sm:block"></div>
            
            <div class="hidden lg:block">
                <h2 class="text-white/80 font-medium text-xs tracking-[0.15em] uppercase">DrawCheck Production Suite</h2>
                <p class="text-[9px] text-white/40 tracking-widest uppercase font-light">Diagnostic Build v2.7</p>
            </div>
        </div>
        <div id="file-meta" class="hidden text-white/60 text-[10px] uppercase tracking-widest bg-black/20 px-5 py-2.5 rounded-full border border-white/10">
            Doc: <span id="doc-name" class="text-white font-bold">--</span> | <span id="page-count">0</span> Pages
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <div class="flex-1 flex flex-col border-r border-gray-200 bg-white overflow-hidden">
            <div id="page-nav" class="hidden h-24 border-b border-gray-100 bg-gray-50 flex items-center gap-4 px-6 overflow-x-auto shrink-0"></div>

            <div id="drop-zone" class="flex-1 m-8 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center p-12 transition-all hover:border-vesta-navy cursor-pointer">
                <div class="w-16 h-16 bg-vesta-navy rounded-xl flex items-center justify-center shadow-lg mb-6 text-white text-3xl font-bold">↑</div>
                <h3 class="serif text-2xl font-semibold text-vesta-navy mb-2">Upload Drawing Set</h3>
                <button onclick="document.getElementById('file-input').click()" class="bg-vesta-navy text-white px-8 py-3 rounded-lg text-sm font-bold uppercase tracking-widest">Select Project File</button>
                <input type="file" id="file-input" class="hidden" accept=".pdf,image/*" onchange="handleFile(event)">
            </div>

            <div id="canvas-area" class="hidden flex-1 relative bg-gray-100 flex items-center justify-center p-10 overflow-auto">
                <canvas id="pdf-render-canvas" class="shadow-2xl bg-white"></canvas>
                <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-4">
                    <button id="audit-btn" onclick="runAudit()" class="btn-secondary px-8 py-4 rounded-full shadow-2xl text-sm font-bold tracking-wider uppercase">Analyze Page</button>
                    <button onclick="location.reload()" class="bg-white text-gray-500 px-8 py-4 rounded-full border border-gray-200 text-sm font-bold uppercase shadow-md">Cancel</button>
                </div>
            </div>
        </div>

        <div class="w-[440px] flex flex-col bg-slate-50 shadow-inner overflow-hidden">
            <div class="flex bg-white border-b border-gray-200 shrink-0">
                <button id="tab-findings" onclick="switchTab('findings')" class="flex-1 py-5 text-[10px] font-bold tracking-widest uppercase tab-active transition-all">Audit</button>
                <button id="tab-budget" onclick="switchTab('budget')" class="flex-1 py-5 text-[10px] font-bold tracking-widest uppercase text-gray-400 hover:text-vesta-navy transition-all">Takeoff</button>
            </div>

            <div id="loading-report" class="hidden flex-1 flex flex-col items-center justify-center p-12">
                <div class="w-10 h-10 border-4 border-t-vesta-burg rounded-full animate-spin mb-4"></div>
                <p class="serif text-lg text-vesta-navy italic font-medium">Connecting to VESTA AI...</p>
            </div>

            <div id="empty-report" class="flex-1 flex flex-col items-center justify-center p-12 text-center opacity-40">
                <p class="text-sm font-light italic">Waiting for analysis execution...</p>
            </div>

            <div id="report-container" class="hidden flex flex-col flex-1 overflow-hidden">
                <div id="findings-content" class="flex-1 overflow-y-auto p-5 flex flex-col gap-5">
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm relative overflow-hidden">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Readiness Score</span>
                        <div class="serif text-5xl font-bold text-vesta-navy tracking-tighter" id="health-score">--</div>
                        <div class="w-full h-1.5 bg-gray-100 rounded-full mt-3 overflow-hidden">
                            <div id="health-bar" class="h-full bg-vesta-navy transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                    <div id="findings-list" class="flex flex-col gap-3 pb-4"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let pdfDoc = null, pageNum = 1, currentImageBase64 = null, sessionAudits = {}; 
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function handleFile(e) {
            const file = e.target.files[0]; if (!file) return;
            document.getElementById('drop-zone').classList.add('hidden');
            document.getElementById('doc-name').textContent = file.name;
            if (file.type === "application/pdf") {
                const ab = await file.arrayBuffer(); pdfDoc = await pdfjsLib.getDocument(ab).promise;
                document.getElementById('file-meta').classList.remove('hidden');
                document.getElementById('page-count').textContent = pdfDoc.numPages;
                document.getElementById('page-nav').classList.remove('hidden');
                renderThumbnails(); renderPage(1);
            }
        }

        async function renderThumbnails() {
            const nav = document.getElementById('page-nav'); nav.innerHTML = "";
            for (let i = 1; i <= Math.min(pdfDoc.numPages, 100); i++) {
                const btn = document.createElement('div');
                btn.className = `page-thumb h-16 w-12 border shadow-sm flex items-center justify-center text-[10px] font-bold rounded ${i===pageNum?'active':''}`;
                btn.innerHTML = `P${i}`;
                btn.onclick = () => renderPage(i); nav.appendChild(btn);
            }
        }

        async function renderPage(num) {
            pageNum = num; const page = await pdfDoc.getPage(num);
            const vp = page.getViewport({ scale: 2.0 }); const cv = document.getElementById('pdf-render-canvas');
            cv.height = vp.height; cv.width = vp.width;
            await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
            currentImageBase64 = cv.toDataURL('image/jpeg', 0.8).split(',')[1];
            document.getElementById('canvas-area').classList.remove('hidden');
        }

        async function runAudit() {
            if (!currentImageBase64) return;
            document.getElementById('loading-report').classList.remove('hidden');
            document.getElementById('empty-report').classList.add('hidden');
            document.getElementById('report-container').classList.add('hidden');

            try {
                // THE SECURE CALL TO OUR PROXY
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "Analyze this drawing page for VESTA. Return JSON { findings: [], takeoff: [], verdict: '' }" }, { inlineData: { mimeType: "image/jpeg", data: currentImageBase64 } }] }],
                        generationConfig: { temperature: 0, responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    const errorJson = await response.json();
                    throw new Error(`[Status ${response.status}]: ${errorJson.error || 'Unknown Server Error'}`);
                }

                const data = await response.json();
                const aiResult = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // DETERMINISTIC SCORING LOGIC
                let score = 100;
                aiResult.findings.forEach(f => {
                    const s = f.severity.toLowerCase();
                    if (s === 'critical') score -= 15;
                    else if (s === 'warning') score -= 5;
                    else if (s === 'info') score -= 2;
                });
                aiResult.healthScore = Math.max(0, score);
                renderReport(aiResult);

            } catch (err) {
                // This alert now shows the SPECIFIC error from the proxy
                alert(`TECHNICAL AUDIT FAILURE:\n${err.message}\n\nREQUIRED ACTIONS:\n1. If Status 404: The 'api' folder is missing in GitHub.\n2. If Status 500: GEMINI_API_KEY is missing/wrong in Vercel settings.\n3. Make sure to REDEPLOY in Vercel after changing settings.`);
            } finally {
                document.getElementById('loading-report').classList.add('hidden');
            }
        }

        function renderReport(data) {
            document.getElementById('report-container').classList.remove('hidden');
            document.getElementById('health-score').textContent = data.healthScore + '%';
            document.getElementById('health-bar').style.width = data.healthScore + '%';
            const fList = document.getElementById('findings-list'); fList.innerHTML = "";
            data.findings.forEach(f => {
                const d = document.createElement('div'); d.className = "bg-white p-4 rounded-xl border-l-4 border-burg shadow-sm text-xs";
                d.innerHTML = `<div class="font-bold text-vesta-navy mb-1 uppercase tracking-wider">${f.title}</div><p class="text-gray-500">${f.description}</p>`;
                fList.appendChild(d);
            });
        }

        function switchTab(t) { /* Simple navigation toggle */ }
    </script>
</body>
</html>
